services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nomad
      POSTGRES_PASSWORD: nomad
      POSTGRES_DB: nomad
    ports:
      - "5433:5432"
    volumes:
      - nomad_backend_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomad -d nomad"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  nomad_backend_db:

# Запуск всего контура Nomad: db + backend + master-web + aroma-web + telegram-bot.
# Веб-приложения публикуются на localhost; VITE_API_BASE_URL зашивается на build,
# поэтому браузер ходит в backend через проброшенный порт хоста (3021).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nomad
      POSTGRES_PASSWORD: nomad
      POSTGRES_DB: nomad
    ports:
      - "5433:5432"
    volumes:
      - nomad_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomad -d nomad"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./apps/backend
    environment:
      HOST: 0.0.0.0
      PORT: "3021"
      DATABASE_URL: postgresql://nomad:nomad@db:5432/nomad?schema=public
      NOMAD_AUTOMATION_KEY: ${NOMAD_AUTOMATION_KEY:-nomad-local-automation-key}
      NOMAD_TOKEN_SECRET: ${NOMAD_TOKEN_SECRET:-nomad-local-secret}
      NOMAD_TOKEN_TTL_HOURS: ${NOMAD_TOKEN_TTL_HOURS:-24}
    ports:
      - "3021:3021"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3021/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  aroma-web:
    build:
      context: ./apps/aroma-web
      args:
        VITE_API_BASE_URL: ${AROMA_VITE_API_BASE_URL:-http://localhost:3021}
    ports:
      - "4174:4174"
    depends_on:
      - backend

  master-web:
    build:
      context: ./apps/master-web
      args:
        VITE_API_BASE_URL: ${MASTER_VITE_API_BASE_URL:-http://localhost:3021}
    ports:
      - "4175:4175"
    depends_on:
      - backend

  seeder:
    # Одноразовое наполнение каталога табаков из htreviews.org.
    # Запуск: `docker compose --profile seed run --rm seeder`.
    profiles: ["seed"]
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql://nomad:nomad@db:5432/nomad?schema=public
      HTREVIEWS_DELAY_MS: ${HTREVIEWS_DELAY_MS:-250}
      HTREVIEWS_REQUEST_TIMEOUT_MS: ${HTREVIEWS_REQUEST_TIMEOUT_MS:-20000}
      HTREVIEWS_FETCH_DETAILS: ${HTREVIEWS_FETCH_DETAILS:-1}
      HTREVIEWS_BRAND_LIMIT: ${HTREVIEWS_BRAND_LIMIT:-}
      HTREVIEWS_TOBACCO_LIMIT: ${HTREVIEWS_TOBACCO_LIMIT:-}
      HTREVIEWS_BRAND_URLS: ${HTREVIEWS_BRAND_URLS:-}
      HTREVIEWS_DEFAULT_IN_STOCK: ${HTREVIEWS_DEFAULT_IN_STOCK:-false}
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma db push --skip-generate && npx tsx scripts/sync-htreviews.ts"]

  telegram-bot:
    # Требует TELEGRAM_BOT_TOKEN. Запускается отдельно: `docker compose --profile bot up`.
    profiles: ["bot"]
    build:
      context: ./services/telegram-bot
    environment:
      NOMAD_BACKEND_URL: http://backend:3021
      NOMAD_BACKEND_AUTOMATION_TOKEN: ${NOMAD_AUTOMATION_KEY:-nomad-local-automation-key}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      NOMAD_BOT_STATE_PATH: /data/nomad-telegram-bot-state.json
    volumes:
      - nomad_bot_state:/data
    depends_on:
      backend:
        condition: service_healthy

volumes:
  nomad_db:
  nomad_bot_state:

name: Nomad PR Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/aroma-web/**
      - apps/master-web/**
      - apps/backend/**
      - services/telegram-bot/**
      - tests/smoke/**
      - .github/**
      - .claude/**
      - CLAUDE.md
      - docs/**

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: nomad-pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      aroma: ${{ steps.filter.outputs.aroma }}
      master: ${{ steps.filter.outputs.master }}
      backend: ${{ steps.filter.outputs.backend }}
      backend_prisma: ${{ steps.filter.outputs.backend_prisma }}
      backend_auth: ${{ steps.filter.outputs.backend_auth }}
      bot: ${{ steps.filter.outputs.bot }}
      runtime: ${{ steps.filter.outputs.runtime }}
      process_core: ${{ steps.filter.outputs.process_core }}
    steps:
      - name: Detect changed Nomad scopes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            aroma:
              - 'apps/aroma-web/**'
            master:
              - 'apps/master-web/**'
            backend:
              - 'apps/backend/**'
            backend_prisma:
              - 'apps/backend/prisma/**'
            backend_auth:
              - 'apps/backend/src/auth.ts'
              - 'apps/backend/src/auth.test.ts'
              - 'apps/backend/src/access.ts'
              - 'apps/backend/src/access.test.ts'
              - 'apps/backend/src/config.ts'
              - 'apps/backend/scripts/bootstrap-admin.ts'
              - 'apps/backend/.env.example'
            bot:
              - 'services/telegram-bot/**'
            runtime:
              - 'services/telegram-bot/ops/**'
              - 'services/telegram-bot/.env.example'
              - 'docs/atelier/env-matrix.md'
              - 'docs/atelier/deployment-smoke-checklist.md'
            process_core:
              - '.github/**'
              - '.claude/**'
              - 'tests/smoke/**'
              - 'CLAUDE.md'
              - 'docs/**'

  nomad-review-flags:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Apply available labels
        uses: actions/github-script@v7
        env:
          AROMA: ${{ needs.changes.outputs.aroma }}
          MASTER: ${{ needs.changes.outputs.master }}
          BACKEND: ${{ needs.changes.outputs.backend }}
          BOT: ${{ needs.changes.outputs.bot }}
          PROCESS_CORE: ${{ needs.changes.outputs.process_core }}
          BACKEND_PRISMA: ${{ needs.changes.outputs.backend_prisma }}
          BACKEND_AUTH: ${{ needs.changes.outputs.backend_auth }}
          RUNTIME: ${{ needs.changes.outputs.runtime }}
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const existingNames = new Set(existing.map((label) => label.name));

            // contour:nomad — legacy (см. labels.md): parallel-track концепт умер
            // после split legacy, на новые PR не навешиваем.
            const desired = new Set();
            if (process.env.AROMA === "true") desired.add("scope:aroma-web");
            if (process.env.MASTER === "true") desired.add("scope:master-web");
            if (process.env.BACKEND === "true") desired.add("scope:backend");
            if (process.env.BOT === "true") desired.add("scope:telegram-bot");
            if (process.env.PROCESS_CORE === "true") desired.add("scope:repo-ops");

            const needsHumanReview =
              process.env.BACKEND_PRISMA === "true" ||
              process.env.BACKEND_AUTH === "true" ||
              process.env.RUNTIME === "true" ||
              process.env.PROCESS_CORE === "true";

            desired.add(needsHumanReview ? "risk:human-review" : "risk:safe");

            const addable = Array.from(desired).filter((name) => existingNames.has(name));
            const missing = Array.from(desired).filter((name) => !existingNames.has(name));

            if (addable.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: addable,
              });
            }

            for (const opposite of ["risk:human-review", "risk:safe"]) {
              if (!existingNames.has(opposite) || desired.has(opposite)) {
                continue;
              }
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: opposite,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            const summary = [
              "## Review flags",
              `Human review required: ${needsHumanReview ? "yes" : "no"}`,
              `Applied labels: ${addable.length > 0 ? addable.join(", ") : "none"}`,
              `Missing labels in repo settings: ${missing.length > 0 ? missing.join(", ") : "none"}`,
            ].join("\n");

            core.summary.addRaw(summary, true);
            await core.summary.write();

  nomad-aroma-build:
    name: nomad-aroma-build
    needs: changes
    if: needs.changes.outputs.aroma == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/aroma-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/aroma-web
        run: npm ci
      - name: Build
        working-directory: apps/aroma-web
        run: npm run build

  nomad-master-build:
    name: nomad-master-build
    needs: changes
    if: needs.changes.outputs.master == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/master-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/master-web
        run: npm ci
      - name: Test
        working-directory: apps/master-web
        run: npm test
      - name: Build
        working-directory: apps/master-web
        run: npm run build

  nomad-backend-build:
    name: nomad-backend-build
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://nomad:nomad@127.0.0.1:5433/nomad?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci
      - name: Start backend database
        working-directory: apps/backend
        # --wait ждёт healthcheck `pg_isready`, чтобы `prisma db push` не падал
        # с P1001 на ещё не открытом порту.
        run: docker compose -f docker-compose.yml up -d --wait db
      - name: Prepare backend schema
        working-directory: apps/backend
        run: |
          npm run prisma:generate
          npm run prisma:dbpush -- --force-reset
      - name: Test
        working-directory: apps/backend
        run: npm test
      - name: Build
        working-directory: apps/backend
        run: npm run build
      - name: Stop backend database
        if: always()
        working-directory: apps/backend
        run: docker compose -f docker-compose.yml down -v

  nomad-bot-build:
    name: nomad-bot-build
    needs: changes
    if: needs.changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/telegram-bot/package-lock.json
      - name: Install dependencies
        working-directory: services/telegram-bot
        run: npm ci
      - name: Test
        working-directory: services/telegram-bot
        run: npm test
      - name: Build
        working-directory: services/telegram-bot
        run: npm run build

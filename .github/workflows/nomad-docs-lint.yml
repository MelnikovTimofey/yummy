name: Nomad Docs Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/**
      - .claude/**
      - CLAUDE.md
      - docs/**
  push:
    branches:
      - main
    paths:
      - .github/**
      - .claude/**
      - CLAUDE.md
      - docs/**

permissions:
  contents: read

concurrency:
  group: nomad-docs-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nomad-docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate YAML syntax
        run: |
          set -eu
          ruby -e 'require "yaml"; Dir[".github/**/*.yml"].sort.each { |file| YAML.load_file(file); puts "OK #{file}" }'
      - name: Validate repo-specific skill structure
        run: |
          set -eu
          for skill_dir in .claude/skills/*; do
            [ -d "${skill_dir}" ] || continue
            test -f "${skill_dir}/SKILL.md" || { echo "Missing ${skill_dir}/SKILL.md"; exit 1; }
          done
      - name: Validate agent definitions
        run: |
          set -eu
          for agent_file in .claude/agents/*.md; do
            [ -f "${agent_file}" ] || continue
            head -1 "${agent_file}" | grep -q '^---$' || { echo "Missing frontmatter in ${agent_file}"; exit 1; }
          done
      - name: Reject placeholder TODO markers
        run: |
          set -eu
          if rg -n --glob '!.github/workflows/nomad-docs-lint.yml' "TODO|Structuring This Skill|Resources \(optional\)" .claude .github docs CLAUDE.md; then
            echo "Placeholder markers found in docs or skills"
            exit 1
          fi
      - name: Check whitespace errors in changed diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git diff --check "${BASE_SHA}" "${HEAD_SHA}"
          else
            git diff --check "${BEFORE_SHA}" "${GITHUB_SHA}"
          fi
